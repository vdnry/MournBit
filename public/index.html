<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MournBit - Real-time garbage dump detection and cleanup coordination platform">
  <title>MournBit — Garbage Detection & Cleanup</title>
  <link rel="icon" type="image/png" href="/logo.png">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- Leaflet Heat -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

  <!-- Socket.io Client -->
  <script src="/socket.io/socket.io.js"></script>

  <!-- App CSS -->
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav id="navbar" class="navbar">
    <div class="nav-brand">
      <img src="/logo.png" alt="MournBit" class="nav-logo">
      <span class="nav-title">MournBit</span>
    </div>
    <div class="nav-links">
      <button id="btn-public-view" class="nav-btn active" onclick="showView('public')" data-i18n="nav.liveMap">Live Map</button>
      <button id="btn-leaderboard" class="nav-btn hidden" onclick="showView('leaderboard')" data-i18n="nav.leaderboard">Leaderboard</button>
      <button id="btn-dashboard" class="nav-btn hidden" onclick="showView('dashboard')" data-i18n="nav.dashboard">Dashboard</button>
      <div id="role-switcher" class="role-switcher hidden">
        <button id="btn-switch-marker" class="role-btn" onclick="switchRole('Marker')" data-i18n="role.marker">Marker</button>
        <button id="btn-switch-volunteer" class="role-btn" onclick="switchRole('Volunteer')" data-i18n="role.volunteer">Volunteer</button>
      </div>
    </div>
    <div class="nav-auth">
      <select id="lang-switch" class="nav-btn" onchange="switchLanguage(this.value)" style="margin-right: 10px; cursor: pointer; background: transparent; border: 1px solid #ccc; color: white;">
        <option value="en" style="color: black;">English</option>
        <option value="hi" style="color: black;">हिंदी</option>
      </select>
      <span id="user-greeting" class="user-greeting hidden"></span>
      <span id="user-role-badge" class="role-badge hidden"></span>
      <button id="btn-login" class="nav-btn accent" onclick="showAuthModal('login')" data-i18n="nav.login">Login</button>
      <button id="btn-register" class="nav-btn" onclick="showAuthModal('register')" data-i18n="nav.register">Register</button>
      <button id="btn-logout" class="nav-btn hidden" onclick="logout()" data-i18n="nav.logout">Logout</button>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="main-content">

    <!-- PUBLIC MAP VIEW -->
    <section id="view-public" class="view active-view">
      <!-- Stats Bar -->
      <div id="stats-bar" class="stats-bar">
        <div class="stat-card">
          <span class="stat-number" id="stat-total">0</span>
          <span class="stat-label" data-i18n="stat.total">Total Reports</span>
        </div>
        <div class="stat-card stat-pending">
          <span class="stat-number" id="stat-pending">0</span>
          <span class="stat-label" data-i18n="status.pending">Pending</span>
        </div>
        <div class="stat-card stat-unclaimed">
          <span class="stat-number" id="stat-unclaimed">0</span>
          <span class="stat-label" data-i18n="status.unclaimed">Unclaimed</span>
        </div>
        <div class="stat-card stat-progress">
          <span class="stat-number" id="stat-inprogress">0</span>
          <span class="stat-label" data-i18n="status.inProgress">In Progress</span>
        </div>
        <div class="stat-card stat-cleared">
          <span class="stat-number" id="stat-cleared">0</span>
          <span class="stat-label" data-i18n="status.cleared">Cleared</span>
        </div>
      </div>

      <!-- Map Container -->
      <div id="map-container" class="map-container">
        <div id="map" class="map"></div>
        <!-- Map Controls -->
        <div class="map-controls">
          <button id="btn-toggle-heat" class="map-ctrl-btn" onclick="toggleHeatmap()" data-i18n="map.heatBtn">🔥 Heatmap</button>
          <button id="btn-my-location" class="map-ctrl-btn" onclick="goToMyLocation()" data-i18n="map.myLocBtn">📍 My Location</button>
          <button id="btn-toggle-cleared" class="map-ctrl-btn" onclick="toggleCleared()" data-i18n="map.clearedBtn">👁️ Show Cleared</button>
        </div>
      </div>
    </section>

    <!-- DASHBOARD VIEW -->
    <section id="view-dashboard" class="view">
      <div id="dashboard-content" class="dashboard-content">
        <!-- Dynamically populated -->
      </div>
    </section>

    <!-- LEADERBOARD VIEW -->
    <section id="view-leaderboard" class="view">
      <div class="dashboard-content">
        <h2 data-i18n="leaderboard.title">Volunteer Leaderboard</h2>
        <div id="leaderboard-content" style="margin-top: 20px;">
          <!-- Fetched dynamically -->
        </div>
      </div>
    </section>

  </main>

  <!-- AUTH MODAL -->
  <div id="auth-modal" class="modal hidden">
    <div class="modal-overlay" onclick="closeAuthModal()"></div>
    <div class="modal-content">
      <button class="modal-close" onclick="closeAuthModal()">&times;</button>
      <h2 id="auth-modal-title">Login</h2>

      <!-- Login Form -->
      <form id="form-login" class="auth-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="Password" required>
        </div>
        <div class="form-group">
          <label for="login-role">Login as</label>
          <select id="login-role">
            <option value="Marker">Marker</option>
            <option value="Volunteer">Volunteer</option>
            <option value="Authority">Authority</option>
          </select>
        </div>
        <button type="submit" class="btn-primary">Login</button>
        <p class="auth-switch">Don't have an account? <a href="#" onclick="showAuthModal('register')">Register</a></p>
      </form>

      <!-- Register Form -->
      <form id="form-register" class="auth-form hidden" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label for="reg-username">Username</label>
          <input type="text" id="reg-username" placeholder="unique_username" required>
        </div>
        <div class="form-group">
          <label for="reg-fullname">Full Name</label>
          <input type="text" id="reg-fullname" placeholder="Your Full Name" required>
        </div>
        <div class="form-group">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" placeholder="Min 6 characters" minlength="6" required>
        </div>
        <div class="form-group">
          <label for="reg-role">Register as</label>
          <select id="reg-role">
            <option value="Marker">Marker / Volunteer</option>
            <option value="Authority">Authority (gmail.com only)</option>
          </select>
        </div>
        <button type="submit" class="btn-primary">Register</button>
        <p class="auth-switch">Already have an account? <a href="#" onclick="showAuthModal('login')">Login</a></p>
      </form>

      <div id="auth-error" class="auth-error hidden"></div>
    </div>
  </div>

  <!-- CREATE TICKET MODAL -->
  <div id="ticket-modal" class="modal hidden">
    <div class="modal-overlay" onclick="closeTicketModal()"></div>
    <div class="modal-content">
      <button class="modal-close" onclick="closeTicketModal()">&times;</button>
      <h2>🗑️ Report Garbage Dump</h2>
      <form id="form-ticket" onsubmit="handleCreateTicket(event)">
        <div class="form-group">
          <label>Location</label>
          <div class="location-display">
            <span id="ticket-lat">—</span>, <span id="ticket-lng">—</span>
            <button type="button" class="btn-small" onclick="useMyLocation()">📍 Use My Location</button>
          </div>
        </div>
        <div class="form-group">
          <label for="ticket-severity">Severity</label>
          <div class="severity-selector">
            <label class="severity-option sev-low">
              <input type="radio" name="severity" value="Low"> Low
            </label>
            <label class="severity-option sev-medium">
              <input type="radio" name="severity" value="Medium" checked> Medium
            </label>
            <label class="severity-option sev-high">
              <input type="radio" name="severity" value="High"> High
            </label>
          </div>
        </div>
        <div class="form-group">
          <label for="ticket-photo">Photo of Garbage Dump *</label>
          <input type="file" id="ticket-photo" accept="image/*" required>
          <div id="photo-preview" class="photo-preview hidden">
            <img id="photo-preview-img" src="" alt="Preview">
          </div>
        </div>
        <button type="submit" class="btn-primary">Submit Report</button>
      </form>
    </div>
  </div>

  <!-- TICKET DETAIL MODAL -->
  <div id="detail-modal" class="modal hidden">
    <div class="modal-overlay" onclick="closeDetailModal()"></div>
    <div class="modal-content modal-wide">
      <button class="modal-close" onclick="closeDetailModal()">&times;</button>
      <div id="detail-content">
        <!-- Dynamically populated -->
      </div>
    </div>
  </div>

  <!-- CLEANUP PHOTO MODAL -->
  <div id="cleanup-modal" class="modal hidden">
    <div class="modal-overlay" onclick="closeCleanupModal()"></div>
    <div class="modal-content">
      <button class="modal-close" onclick="closeCleanupModal()">&times;</button>
      <h2>📸 Submit Cleanup Photo</h2>
      <form id="form-cleanup" onsubmit="handleClearTicket(event)">
        <input type="hidden" id="cleanup-ticket-id">
        <div class="form-group">
          <label for="cleanup-photo">Photo of Cleared Area *</label>
          <input type="file" id="cleanup-photo" accept="image/*" required>
        </div>
        <button type="submit" class="btn-primary">Submit Cleanup</button>
      </form>
    </div>
  </div>

  <!-- NOTIFICATION TOAST -->
  <div id="toast-container" class="toast-container"></div>

  <!-- App Scripts -->
  <script src="/js/socket.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/map.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/js/app.js"></script>

</body>
</html>
